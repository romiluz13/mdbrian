name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Typecheck, lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (monorepo)
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Check publishability
        run: bun run check-publishability

      - name: Test
        run: bun run test

# MongoDB only — run `apps/api` on the host with e.g.
# MDBRAIN_MONGODB_URI=mongodb://127.0.0.1:27017
# (or `mongodb://mongodb:27017/...` when the API runs in another container on the same network).
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mdbrain_mongo_data:/data/db

volumes:
  mdbrain_mongo_data: {}

# mongot.conf - MongoDB Community Search configuration for Mdbrain
# Adapted from github.com/JohnGUnderwood/mdb-community-search

syncSource:
   replicaSet:
      hostAndPort: "mdbrain-mongod.mdbrain-net:27017"
      username: "mongotUser"
      passwordFile: "/auth/passwordFile"
      authSource: "admin"
      tls: false

storage:
   dataPath: "/data/mongot"

server:
   grpc:
      address: "mdbrain-mongot.mdbrain-net:27028"

metrics:
   enabled: true
   address: "mdbrain-mongot.mdbrain-net:9946"

healthCheck:
   address: "mdbrain-mongot.mdbrain-net:8080"

logging:
   verbosity: INFO

# The setup-generator writes a runtime config to /auth/mongot.generated.yml.
# When embedding keys are present it appends:

# docker-compose.mongodb.yml - MongoDB setup for Mdbrain
# Adapted from github.com/JohnGUnderwood/mdb-community-search
#
# Usage:
#   Full stack (mongod + mongot + vector search):
#     docker compose -f docker/mongodb/docker-compose.mongodb.yml --profile setup run --rm setup-generator
#     docker compose -f docker/mongodb/docker-compose.mongodb.yml --profile fullstack up -d
#
#   Replica set only (transactions, no vector search):
#     docker compose -f docker/mongodb/docker-compose.mongodb.yml --profile replicaset up -d
#
#   Standalone (simplest, no transactions or search):
#     docker compose -f docker/mongodb/docker-compose.mongodb.yml --profile standalone up -d

services:
  # One-time setup: generates keyfile, password files, optional Voyage API key files
  setup-generator:
    image: alpine:latest
    container_name: mdbrain-setup
    volumes:
      - auth-files:/auth
      - ./.runtime:/runtime
      - ./setup-generator.sh:/setup-generator.sh:ro
      - ./mongot.conf:/templates/mongot.conf:ro
    environment:
      - MONGOT_PASSWORD=${MONGOT_PASSWORD:-mongotPassword}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - VOYAGE_API_QUERY_KEY=${VOYAGE_API_QUERY_KEY:-}
      - VOYAGE_API_INDEXING_KEY=${VOYAGE_API_INDEXING_KEY:-}
      - MONGOT_EMBEDDING_PROVIDER_ENDPOINT=${MONGOT_EMBEDDING_PROVIDER_ENDPOINT:-https://ai.mongodb.com/v1/embeddings}
      - MONGOT_GENERATED_FILE=/runtime/mongot.generated.yml
    command: ["/setup-generator.sh"]
    restart: "no"
    profiles:
      - setup

  # Tier 1: Standalone MongoDB (simplest - no transactions, no search)
  mongod-standalone:
    image: mongodb/mongodb-community-server:latest
    container_name: mdbrain-mongod-standalone
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongod_standalone_data:/data/db
    profiles:
      - standalone
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Tier 2 & 3: MongoDB with replica set (used by both replicaset and fullstack profiles)
  mongod:
    image: mongodb/mongodb-community-server:latest
    container_name: mdbrain-mongod
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: ${ADMIN_PASSWORD:-admin}
      MONGOT_PASSWORD: ${MONGOT_PASSWORD:-mongotPassword}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    command: >-
      mongod
      --config /etc/mongod.conf
      --replSetMember=mdbrain-mongod.mdbrain-net:27017
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongod_data:/data/db
      - mongod_configdb:/data/configdb
      - ./mongod.conf:/etc/mongod.conf:ro
      - auth-files:/auth
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    networks:
      - mdbrain-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - replicaset
      - fullstack

  # Tier 3: mongot search engine (fullstack only)
  mongot:
    image: mongodb/mongodb-community-search:latest
    container_name: mdbrain-mongot
    environment:
      MONGOT_EMBEDDING_PROVIDER_ENDPOINT: ${MONGOT_EMBEDDING_PROVIDER_ENDPOINT:-https://ai.mongodb.com/v1/embeddings}
    ports:
      - "${MONGOT_GRPC_PORT:-27028}:27028"
      - "${MONGOT_HEALTH_PORT:-8080}:8080"
      - "${MONGOT_METRICS_PORT:-9946}:9946"
    volumes:
      - mongot_data:/data/mongot
      - ./.runtime/mongot.generated.yml:/mongot-community/config.default.yml:ro
      - auth-files:/auth
    networks:
      - mdbrain-net
    depends_on:
      mongod:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://mdbrain-mongot.mdbrain-net:9946/metrics",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - fullstack

volumes:
  mongod_standalone_data:
  mongod_data:
  mongod_configdb:
  mongot_data:
  auth-files:

networks:
  mdbrain-net:
    name: mdbrain-net
    driver: bridge
